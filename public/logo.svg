<svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo Icon - H + L geometric combination -->
  <g transform="translate(0, 4)">
    <!-- Main geometric shape combining H and L -->
    <rect x="0" y="0" width="32" height="32" rx="8" fill="#22C55E"/>
    
    <!-- H shape -->
    <rect x="8" y="8" width="4" height="16" rx="2" fill="#0B0F1A"/>
    <rect x="20" y="8" width="4" height="16" rx="2" fill="#0B0F1A"/>
    <rect x="12" y="14" width="8" height="4" rx="2" fill="#0B0F1A"/>
    
    <!-- L shape integrated (bottom right corner) -->
    <rect x="20" y="18" width="4" height="6" rx="2" fill="#0B0F1A"/>
  </g>
  
  <!-- Wordmark -->
  <text x="44" y="27" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="700" letter-spacing="-0.5" fill="#F9FAFB">
    Hirelancer
  </text>
</svg>
